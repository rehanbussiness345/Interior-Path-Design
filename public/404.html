<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect to index.html to handle routing via hash
      window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/') + '/index.html');
    </script>
  </head>
  <body></body>
</html>
